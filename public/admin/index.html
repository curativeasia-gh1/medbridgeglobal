<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog CMS</title>
  <link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
<aside><h2>Blog CMS</h2><button id="listBtn">Articles</button><button id="newBtn">New article</button><a href="/blog/" target="_blank">View blog</a></aside>
<main>
  <p id="notice"></p>
  <section id="listView">
    <h1>Articles</h1>
    <table><thead><tr><th>Title</th><th>Status</th><th>Updated</th><th></th></tr></thead><tbody id="rows"></tbody></table>
  </section>

  <section id="editView" hidden>
    <h1 id="heading">New article</h1>
    <form id="form">
      <input id="id" type="hidden">
      <label>Title<input id="title" required></label>
      <label>Slug<input id="slug" required></label>
      <label>Excerpt<textarea id="excerpt"></textarea></label>
      <label>Content HTML<textarea id="content_html" rows="18"></textarea></label>
      <label>Author<input id="author"></label>
      <label>Category<input id="postCategory"></label>
      <label>Featured image URL<input id="featured_image"></label>
      <label>Image alt text<input id="featured_image_alt"></label>
      <label>SEO title<input id="seo_title"></label>
      <label>Meta description<textarea id="meta_description"></textarea></label>
      <label>Status<select id="postStatus"><option>draft</option><option>published</option><option>archived</option></select></label>
      <div class="actions"><button type="submit">Save</button><button id="deleteBtn" type="button" hidden>Delete</button></div>
    </form>

    <form id="uploadForm">
      <h2>Upload image</h2>
      <input id="file" type="file" accept="image/*" required>
      <input id="alt" placeholder="Alt text">
      <button>Upload</button>
    </form>
  </section>
</main>
<script src="/assets/admin.js"></script>
</body>
</html>
